<style>
  :root{
    --navy:#4338CA;
    --indigo:#5B6BFF;
    --purple:#A855F7;
    --coral:#FF7A59;
    --green:#22C55E;
    --teal:#14B8A6;
    --bg:#FAFAFF;
    --paper:#F5F5FC;
    --white:#FFFFFF;
    --line:#EEEEF5;
    --muted:#7A78A8;
    --tint-indigo:rgba(91,107,255,0.09);
    --tint-purple:rgba(168,85,247,0.09);
    --tint-coral:rgba(255,122,89,0.10);
    --tint-green:rgba(34,197,94,0.09);
    --tint-teal:rgba(20,184,166,0.10);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{color-scheme:light;}
  html,body{background:var(--bg); color:var(--navy); font-family:'Poppins',sans-serif; -webkit-font-smoothing:antialiased;}
  body{padding-bottom:88px;}

  /* Hero header */
  header{
    background:linear-gradient(135deg, var(--indigo), var(--purple));
    padding:26px 20px 40px;
    position:relative;
    overflow:hidden;
  }
  header::before{
    content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px;
    border-radius:50%; background:rgba(255,255,255,0.10);
  }
  header::after{
    content:''; position:absolute; bottom:-80px; left:-40px; width:180px; height:180px;
    border-radius:50%; background:rgba(255,255,255,0.07);
  }
  .brand-row{display:flex; align-items:center; gap:12px; position:relative; z-index:2;}
  .ring-logo{
    width:40px; height:40px; border-radius:50%; flex-shrink:0; position:relative;
    background:rgba(255,255,255,0.9);
    box-shadow:0 2px 8px rgba(13,19,43,0.15);
  }
  .ring-logo .arc{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from -18deg, var(--purple), var(--indigo), var(--teal), var(--green), var(--coral), var(--purple));
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 9px), #000 calc(100% - 8px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 9px), #000 calc(100% - 8px));
  }
  .ring-logo .dot{position:absolute; width:9px; height:9px; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,0.9);}
  .ring-logo .dot.d1{background:var(--purple); left:15px; top:1px;}
  .ring-logo .dot.d2{background:var(--indigo); left:28px; top:10px;}
  .ring-logo .dot.d3{background:var(--teal); left:23px; top:27px;}
  .ring-logo .dot.d4{background:var(--green); left:7px; top:27px;}
  .ring-logo .dot.d5{background:var(--coral); left:2px; top:10px;}
  .brand-name{font-weight:700; font-size:21px; letter-spacing:-0.01em; color:var(--white);}
  .tagline{font-size:12.5px; color:rgba(255,255,255,0.85); margin-top:3px; margin-left:52px; position:relative; z-index:2;}
  .count-pill{
    margin-left:auto; font-size:11.5px; font-weight:600; color:var(--white);
    background:rgba(255,255,255,0.18); padding:6px 12px; border-radius:20px;
    white-space:nowrap;
  }

  .tab-shelf{
    background:var(--white); border-radius:18px; margin:18px 20px 0;
    padding:8px; box-shadow:0 10px 24px rgba(67,56,202,0.18);
    position:relative; z-index:3;
  }
  .tabs{display:flex; gap:6px; overflow-x:auto;}
  .tab{
    font-family:'Poppins',sans-serif; font-size:12.5px; font-weight:600;
    padding:9px 14px; border:none; border-radius:12px; color:var(--muted);
    background:transparent; cursor:pointer; white-space:nowrap;
  }
  .tab.active{color:var(--white);}
  .tab[data-tier="all"].active{background:var(--navy);}
  .tab[data-tier="My Circle"].active{background:var(--indigo);}
  .tab[data-tier="Close Friends"].active{background:var(--coral);}
  .tab[data-tier="Out of My Circle"].active{background:var(--green);}

  main{padding:24px 20px; max-width:640px; margin:0 auto; background:var(--bg);}

  .section-label{
    font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:8px;
  }
  .section-label .icon{width:14px; height:14px; flex-shrink:0;}
  .ticker{margin-bottom:28px;}
  .ticker-row{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; margin:0 -20px; padding-left:20px; padding-right:20px;}
  .chip{
    flex:0 0 auto; border-radius:14px; padding:13px 16px; min-width:152px;
  }
  .chip .name{font-size:14.5px; font-weight:700; color:var(--navy);}
  .chip .meta{font-size:12px; font-weight:700; margin-top:5px;}
  .chip.lvl-overdue{background:var(--tint-coral);} .chip.lvl-overdue .meta{color:var(--coral);}
  .chip.lvl-soon{background:var(--tint-purple);} .chip.lvl-soon .meta{color:var(--purple);}
  .chip.lvl-event{background:var(--tint-teal);} .chip.lvl-event .meta{color:var(--teal);}
  .empty-note{font-size:13px; color:var(--muted); padding:8px 0;}

  .roster-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px;}
  .export-btn{
    font-size:12px; font-weight:600; color:var(--indigo); background:none; border:1.5px solid var(--indigo);
    border-radius:20px; padding:7px 12px; cursor:pointer; white-space:nowrap;
  }
  .export-btn.filled{background:var(--indigo); color:var(--white);}

  .plan-card{
    background:var(--tint-indigo); border-left:5px solid var(--indigo); border-radius:14px;
    padding:14px 16px; margin-bottom:10px;
  }
  .plan-card .who{font-size:15px; font-weight:700; color:var(--navy);}
  .plan-card .who .sent-badge{
    display:inline-block; font-size:9.5px; font-weight:600; padding:2px 7px; border-radius:7px;
    margin-left:8px; vertical-align:middle; color:var(--white); background:var(--teal);
  }
  .plan-card .who .pending-badge{
    display:inline-block; font-size:9.5px; font-weight:600; padding:2px 7px; border-radius:7px;
    margin-left:8px; vertical-align:middle; color:var(--white); background:var(--indigo);
  }
  .plan-card .when{font-size:12.5px; font-weight:700; color:var(--indigo); margin-top:4px;}
  .plan-card .details{font-size:12px; color:var(--muted); margin-top:3px;}
  .plan-actions{display:flex; gap:8px; margin-top:12px;}
  .btn-sm{font-size:12.5px; padding:8px 10px; border-radius:9px;}

  /* Friend cards */
  .card{
    border-radius:18px; padding:18px; margin-bottom:14px; position:relative; overflow:hidden;
    border-left:5px solid transparent;
  }
  .card.tint-mycircle{background:var(--tint-indigo); border-left-color:var(--indigo);}
  .card.tint-close{background:var(--tint-coral); border-left-color:var(--coral);}
  .card.tint-out{background:var(--tint-green); border-left-color:var(--green);}
  .card-top{display:flex; gap:14px; align-items:center;}
  .ring-avatar{
    width:60px; height:60px; border-radius:50%; flex-shrink:0; padding:3.5px;
    display:flex; align-items:center; justify-content:center;
  }
  .ring-avatar .inner{
    width:100%; height:100%; border-radius:50%; background:var(--white);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px; color:var(--navy);
  }
  .card-info{flex:1; min-width:0;}
  .card-name{font-size:18px; font-weight:700; color:var(--navy); letter-spacing:-0.01em;}
  .tier-badge{
    display:inline-block; font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:8px;
    margin-top:5px; color:var(--white);
  }
  .tier-badge.t-mycircle{background:var(--indigo);}
  .tier-badge.t-close{background:var(--coral);}
  .tier-badge.t-out{background:var(--green);}

  .card-meta{
    font-size:12.5px; color:var(--muted); margin-top:14px; display:flex; flex-wrap:wrap; gap:6px 16px;
  }
  .card-meta strong{color:var(--navy); font-weight:700;}
  .card-actions{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .card-actions .btn{flex:1 1 28%; padding:11px 8px; font-size:12.5px;}
  .btn{
    font-family:'Poppins',sans-serif; font-size:13.5px; font-weight:600; border:none; border-radius:11px;
    padding:11px 14px; cursor:pointer; flex:1;
  }
  .btn-primary{background:linear-gradient(135deg, var(--indigo), var(--purple)); color:var(--white);}
  .btn-ghost{background:var(--white); color:var(--navy); border:1.5px solid var(--line);}
  .btn-ghost:active, .btn-primary:active{transform:scale(0.97);}

  .stamp-mark{
    position:absolute; top:14px; right:16px; font-size:12px; font-weight:700; color:var(--teal);
    border:2px solid var(--teal); border-radius:8px; padding:2px 9px; transform:rotate(-6deg) scale(0);
    opacity:0; text-transform:uppercase; pointer-events:none; background:var(--white);
  }
  .stamp-mark.fire{animation:stampIn 1.1s ease forwards;}
  @keyframes stampIn{
    0%{transform:rotate(-6deg) scale(2); opacity:0;}
    35%{transform:rotate(-6deg) scale(0.95); opacity:1;}
    50%{transform:rotate(-6deg) scale(1.05); opacity:1;}
    100%{transform:rotate(-6deg) scale(1); opacity:1;}
  }

  .fab{
    position:fixed; bottom:22px; right:22px; width:58px; height:58px; border-radius:50%;
    background:linear-gradient(135deg, var(--indigo), var(--purple)); color:var(--white); border:none;
    font-size:28px; cursor:pointer; box-shadow:0 6px 18px rgba(91,107,255,0.4); z-index:30;
    animation:fabPulse 3s ease-in-out infinite;
  }
  .fab:active{transform:scale(0.95);}
  @keyframes fabPulse{
    0%, 100%{box-shadow:0 6px 18px rgba(91,107,255,0.4);}
    50%{box-shadow:0 6px 24px rgba(168,85,247,0.55);}
  }

  .overlay{
    position:fixed; inset:0; background:rgba(13,19,43,0.45); display:none; align-items:flex-end;
    justify-content:center; z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--white); border-radius:20px 20px 0 0;
    width:100%; max-width:640px; max-height:88vh; overflow-y:auto; padding:22px 20px 30px;
  }
  .sheet h2{font-size:19px; margin-bottom:18px; font-weight:700; color:var(--navy);}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--paper); border:1.5px solid var(--line); border-radius:10px;
    color:var(--navy); padding:11px 12px; font-size:14px; font-family:'Poppins',sans-serif;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--indigo); outline-offset:1px;}
  .field textarea{resize:vertical; min-height:56px;}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .sheet-actions{display:flex; gap:10px; margin-top:18px;}
  .sheet-actions .btn{padding:12px;}
  .danger{
    color:var(--coral); font-size:12.5px; font-weight:600; background:none; border:none;
    margin-top:16px; cursor:pointer; text-decoration:underline; display:block;
  }

  .link-muted{
    color:var(--muted); font-size:11.5px; font-weight:600; background:none; border:none;
    cursor:pointer; text-decoration:underline;
  }

  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--navy); color:var(--white); font-size:13px; font-weight:600; padding:11px 20px;
    border-radius:24px; opacity:0; pointer-events:none; z-index:60; transition:all 0.25s ease;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .empty-state{text-align:center; padding:50px 20px;}
  .empty-state .empty-ring{width:64px; height:64px; margin:0 auto 18px; position:relative;}
  .empty-state .headline{font-size:19px; font-weight:700; color:var(--navy); margin-bottom:6px;}
  .empty-state .sub{font-size:13.5px; color:var(--muted); margin-bottom:20px;}
  .empty-cta{
    display:inline-block; font-family:'Poppins',sans-serif; font-size:14px; font-weight:600;
    background:linear-gradient(135deg, var(--indigo), var(--purple)); color:var(--white);
    border:none; border-radius:12px; padding:12px 22px; cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <div class="brand-row">
    <div class="ring-logo">
      <div class="arc"></div>
      <div class="dot d1"></div>
      <div class="dot d2"></div>
      <div class="dot d3"></div>
      <div class="dot d4"></div>
      <div class="dot d5"></div>
    </div>
    <div>
      <div class="brand-name">Connections</div>
    </div>
    <span class="count-pill" id="friendCount">0 kept</span>
  </div>
  <div class="tagline">The people who matter, organized.</div>
  <div class="tab-shelf">
    <div class="tabs" id="tabs">
      <button class="tab active" data-tier="all">All</button>
      <button class="tab" data-tier="My Circle">My Circle</button>
      <button class="tab" data-tier="Close Friends">Close Friends</button>
      <button class="tab" data-tier="Out of My Circle">Out of My Circle</button>
    </div>
  </div>
</header>

<main>
  <div class="ticker" id="dueTicker">
    <div class="section-label">Due this week</div>
    <div class="ticker-row" id="dueRow"></div>
  </div>

  <div class="ticker" id="eventTicker">
    <div class="section-label">Birthdays &amp; events coming up</div>
    <div class="ticker-row" id="eventRow"></div>
  </div>

  <div class="ticker" id="plansTicker">
    <div class="roster-head">
      <div class="section-label" style="margin-bottom:0;">Upcoming plans</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="export-btn filled" onclick="openPlan()">+ New plan</button>
        <button class="export-btn" id="exportPlansBtn" onclick="exportAllPlans()">Export plans (.ics)</button>
      </div>
    </div>
    <div id="plansList"></div>
    <div style="text-align:center; margin-top:8px;">
      <button class="link-muted" onclick="exportAllPlans(true)">Resend everything (incl. already sent)</button>
    </div>
  </div>

  <div class="roster-head">
    <div class="section-label" style="margin-bottom:0;">Roster</div>
    <button class="export-btn" onclick="exportAll()">Export dates (.ics)</button>
  </div>

  <div id="cardList"></div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="empty-ring">
      <div class="ring-logo" style="width:64px; height:64px; background:rgba(91,107,255,0.08); box-shadow:none;">
        <div class="arc"></div>
        <div class="dot d1" style="left:27px; top:2px; width:14px; height:14px;"></div>
        <div class="dot d2" style="left:50px; top:18px; width:14px; height:14px;"></div>
        <div class="dot d3" style="left:41px; top:46px; width:14px; height:14px;"></div>
        <div class="dot d4" style="left:13px; top:46px; width:14px; height:14px;"></div>
        <div class="dot d5" style="left:4px; top:18px; width:14px; height:14px;"></div>
      </div>
    </div>
    <div class="headline">No one here yet</div>
    <div class="sub">Add your first connection to start tracking who matters.</div>
    <button class="empty-cta" onclick="openAdd()">+ Add a connection</button>
  </div>
</main>

<button class="fab" id="addBtn" aria-label="Add friend">+</button>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let friends = [];
let plans = [];
let currentTier = 'all';
let editingId = null;
let editingPlanId = null;

const ACTIVITY_TYPES = [
  {id:'lunch', label:'Lunch / Dinner'},
  {id:'smoke', label:'Smoke Session'},
  {id:'event', label:'Event'},
  {id:'call', label:'Call'},
  {id:'other', label:'Other'}
];

const el = id => document.getElementById(id);
const uid = () => 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);

async function loadFriends(){
  try{
    const res = await window.storage.get('friends', false);
    friends = res ? JSON.parse(res.value) : [];
  }catch(e){ friends = []; }
  render();
}
async function saveFriends(){
  try{ await window.storage.set('friends', JSON.stringify(friends), false); }
  catch(e){ console.error('Save failed', e); showToast('Could not save, try again'); }
}

async function loadPlans(){
  try{
    const res = await window.storage.get('plans', false);
    plans = res ? JSON.parse(res.value) : [];
  }catch(e){ plans = []; }
  renderPlans();
}
async function savePlans(){
  try{ await window.storage.set('plans', JSON.stringify(plans), false); }
  catch(e){ console.error('Save failed', e); showToast('Could not save plan, try again'); }
}

function daysBetween(a,b){
  const ms = 24*60*60*1000;
  return Math.floor((b - a) / ms);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }

function nextOccurrence(dateStr){
  if(!dateStr) return null;
  const parts = dateStr.split('-').map(Number);
  const m = parts[1], d = parts[2];
  const now = new Date(); now.setHours(0,0,0,0);
  let next = new Date(now.getFullYear(), m-1, d);
  if(next < now) next = new Date(now.getFullYear()+1, m-1, d);
  return next;
}

function statusFor(friend){
  if(!friend.lastContact) return {level:'overdue', days:null};
  const last = new Date(friend.lastContact);
  const now = new Date(); now.setHours(0,0,0,0);
  const elapsed = daysBetween(last, now);
  const cadence = friend.cadenceDays || 21;
  const soonThreshold = Math.max(1, Math.round(cadence * 0.7));
  if(elapsed >= cadence) return {level:'overdue', days:elapsed};
  if(elapsed >= soonThreshold) return {level:'soon', days:elapsed};
  return {level:'ok', days:elapsed};
}

function statusColor(level){
  if(level === 'overdue') return 'var(--coral)';
  if(level === 'soon') return 'var(--purple)';
  return 'var(--teal)';
}

function tierClass(tier){
  if(tier === 'My Circle') return 't-mycircle';
  if(tier === 'Close Friends') return 't-close';
  return 't-out';
}
function tierTintClass(tier){
  if(tier === 'My Circle') return 'tint-mycircle';
  if(tier === 'Close Friends') return 'tint-close';
  return 'tint-out';
}

function initials(name){
  const parts = name.trim().split(/\s+/);
  const a = parts[0] ? parts[0][0] : '';
  const b = parts.length > 1 ? parts[parts.length-1][0] : '';
  return (a + b).toUpperCase();
}

function fmtDate(d){
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}
function fmtDateTime(dtStr){
  const d = new Date(dtStr);
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) +
    ' · ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

function renderPlans(){
  const sorted = plans.slice().sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
  const pendingCount = plans.filter(p => !p.exported).length;
  const exportBtn = el('exportPlansBtn');
  if(exportBtn){
    exportBtn.textContent = pendingCount > 0 ? ('Export plans (' + pendingCount + ' new)') : 'Export plans (.ics)';
  }
  if(!sorted.length){
    el('plansList').innerHTML = '<div class="empty-note">No plans yet, add one for someone due soon.</div>';
    return;
  }
  el('plansList').innerHTML = sorted.map(p => {
    const typeLabel = (ACTIVITY_TYPES.find(t => t.id === p.type) || {label:'Hangout'}).label;
    const badge = p.exported
      ? '<span class="sent-badge">Sent</span>'
      : '<span class="pending-badge">New</span>';
    return '' +
    '<div class="plan-card">' +
      '<div class="who">' + escapeHtml(p.friendName) + badge + '</div>' +
      '<div class="when">' + fmtDateTime(p.dateTime) + '</div>' +
      '<div class="details">' + escapeHtml(typeLabel) + (p.location ? ' · ' + escapeHtml(p.location) : '') + '</div>' +
      '<div class="plan-actions">' +
        '<button class="btn btn-primary btn-sm" onclick="markPlanDone(\'' + p.id + '\')">Mark done</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="exportOnePlan(\'' + p.id + '\')">Export</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="openPlan(null, \'' + p.id + '\')">Edit</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function render(){
  const filtered = currentTier === 'all' ? friends : friends.filter(f => f.tier === currentTier);
  el('friendCount').textContent = friends.length + (friends.length === 1 ? ' kept' : ' kept');

  const dueList = friends
    .map(f => ({f, s: statusFor(f)}))
    .filter(x => x.s.level === 'overdue' || x.s.level === 'soon')
    .sort((a,b) => (b.s.days || 999) - (a.s.days || 999));

  if(dueList.length){
    el('dueRow').innerHTML = dueList.map(({f,s}) => {
      const metaText = s.days === null ? 'never logged' : (s.level === 'overdue' ? (s.days + 'd overdue') : ('due in ' + Math.max(0,(f.cadenceDays||21) - s.days) + 'd'));
      return '<div class="chip lvl-' + s.level + '"><div class="name">' + escapeHtml(f.name) + '</div><div class="meta">' + metaText + '</div></div>';
    }).join('');
  } else {
    el('dueRow').innerHTML = '<div class="empty-note">Nobody due, you are on top of it.</div>';
  }

  const events = [];
  friends.forEach(f => {
    if(f.birthday){
      const nd = nextOccurrence(f.birthday);
      const days = daysBetween(new Date(new Date().setHours(0,0,0,0)), nd);
      if(days <= 30) events.push({name:f.name, label:'Birthday', date:nd, days});
    }
    if(f.importantDate && f.importantDate.date){
      const nd = nextOccurrence(f.importantDate.date);
      const days = daysBetween(new Date(new Date().setHours(0,0,0,0)), nd);
      if(days <= 30) events.push({name:f.name, label:f.importantDate.label || 'Event', date:nd, days});
    }
  });
  events.sort((a,b) => a.days - b.days);

  if(events.length){
    el('eventRow').innerHTML = events.map(e => {
      const when = e.days === 0 ? 'today' : fmtDate(e.date);
      return '<div class="chip lvl-event"><div class="name">' + escapeHtml(e.name) + '</div><div class="meta">' + escapeHtml(e.label) + ' &middot; ' + when + '</div></div>';
    }).join('');
  } else {
    el('eventRow').innerHTML = '<div class="empty-note">Nothing in the next 30 days.</div>';
  }

  if(filtered.length === 0){
    el('cardList').innerHTML = '';
    el('emptyState').style.display = 'block';
  } else {
    el('emptyState').style.display = 'none';
    el('cardList').innerHTML = filtered.map(f => cardHtml(f)).join('');
  }
}

function cardHtml(f){
  const s = statusFor(f);
  const cadence = f.cadenceDays || 21;
  const pct = s.days === null ? 100 : Math.min(100, Math.round((s.days / cadence) * 100));
  const color = statusColor(s.level);
  const ringStyle = 'background: conic-gradient(' + color + ' ' + pct + '%, var(--line) 0);';
  const nb = f.birthday ? nextOccurrence(f.birthday) : null;
  const nbDays = nb ? daysBetween(new Date(new Date().setHours(0,0,0,0)), nb) : null;

  return '' +
  '<div class="card ' + tierTintClass(f.tier) + '" data-id="' + f.id + '">' +
    '<div class="stamp-mark" id="stamp-' + f.id + '">Logged</div>' +
    '<div class="card-top">' +
      '<div class="ring-avatar" style="' + ringStyle + '"><div class="inner">' + escapeHtml(initials(f.name)) + '</div></div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + escapeHtml(f.name) + '</div>' +
        '<span class="tier-badge ' + tierClass(f.tier) + '">' + escapeHtml(f.tier) + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="card-meta">' +
      '<span>' + (s.days === null ? 'never logged' : ('<strong>' + s.days + 'd</strong> since contact')) + '</span>' +
      '<span>every <strong>' + cadence + 'd</strong></span>' +
      (nb ? '<span>bday <strong>' + fmtDate(nb) + '</strong>' + (nbDays <= 30 ? ' (' + nbDays + 'd)' : '') + '</span>' : '') +
    '</div>' +
    '<div class="card-actions">' +
      '<button class="btn btn-primary" onclick="openLog(\'' + f.id + '\')">Log contact</button>' +
      '<button class="btn btn-ghost" onclick="openPlan(\'' + f.id + '\')">Plan</button>' +
      '<button class="btn btn-ghost" onclick="openEdit(\'' + f.id + '\')">Edit</button>' +
    '</div>' +
  '</div>';
}

async function quickLogContact(id, type){
  const f = friends.find(x => x.id === id);
  if(!f) return;
  f.lastContact = todayISO();
  f.history = f.history || [];
  f.history.unshift({date:f.lastContact, type: type || 'other'});
  await saveFriends();
  render();
  const stampEl = document.getElementById('stamp-' + id);
  if(stampEl){
    stampEl.classList.remove('fire');
    void stampEl.offsetWidth;
    stampEl.classList.add('fire');
  }
  showToast('Logged, ' + f.name);
}

function openPlan(friendId, planId){
  editingPlanId = planId || null;
  const existing = planId ? plans.find(p => p.id === planId) : null;
  el('sheet').innerHTML = planForm(friendId, existing);
  el('overlay').classList.add('show');
}

function planForm(friendId, existing){
  const isEdit = !!existing;
  const lockedFriendId = friendId || (existing && existing.friendId) || '';
  const lockedFriend = lockedFriendId ? friends.find(f => f.id === lockedFriendId) : null;
  const p = existing || {dateTime:'', type:'lunch', duration:60, location:'', notes:''};

  const friendPicker = lockedFriend
    ? '<div class="field"><label>Friend</label><input value="' + escapeHtml(lockedFriend.name) + '" disabled></div>' +
      '<input type="hidden" id="planFriendId" value="' + lockedFriend.id + '">'
    : '<div class="field"><label>Friend</label><select id="planFriendId">' +
        friends.map(f => '<option value="' + f.id + '">' + escapeHtml(f.name) + '</option>').join('') +
      '</select></div>';

  return '' +
    '<h2>' + (isEdit ? 'Edit plan' : 'Plan a hangout') + '</h2>' +
    friendPicker +
    '<div class="field"><label>When</label><input id="planDateTime" type="datetime-local" value="' + (p.dateTime || '') + '"></div>' +
    '<div class="row2">' +
      '<div class="field"><label>What</label><select id="planType">' + ACTIVITY_TYPES.map(t => '<option value="' + t.id + '" ' + (p.type===t.id?'selected':'') + '>' + t.label + '</option>').join('') + '</select></div>' +
      '<div class="field"><label>Duration</label><select id="planDuration">' +
        [30,60,90,120].map(m => '<option value="' + m + '" ' + (p.duration===m?'selected':'') + '>' + m + ' min</option>').join('') +
      '</select></div>' +
    '</div>' +
    '<div class="field"><label>Location (optional)</label><input id="planLocation" value="' + escapeHtml(p.location||'') + '" placeholder="Where"></div>' +
    '<div class="field"><label>Notes (optional)</label><textarea id="planNotes" placeholder="Anything to remember">' + escapeHtml(p.notes||'') + '</textarea></div>' +
    '<div class="sheet-actions">' +
      '<button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="savePlan()">' + (isEdit ? 'Save changes' : 'Add plan') + '</button>' +
    '</div>' +
    (isEdit && existing.exported ? '<div class="empty-note" style="background:var(--tint-coral); border-radius:10px; padding:10px 12px; margin-top:4px;">Already sent to your calendar. Removing it here does not delete it there, you will need to remove that event manually.</div>' : '') +
    (isEdit ? '<button class="danger" onclick="deletePlan(\'' + existing.id + '\')">Remove plan</button>' : '');
}

async function savePlan(){
  const friendId = el('planFriendId').value;
  const dateTime = el('planDateTime').value;
  if(!friendId){ showToast('Pick a friend'); return; }
  if(!dateTime){ showToast('Pick a date and time'); return; }
  const friend = friends.find(f => f.id === friendId);
  const data = {
    friendId,
    friendName: friend ? friend.name : 'Friend',
    dateTime,
    type: el('planType').value,
    duration: parseInt(el('planDuration').value) || 60,
    location: el('planLocation').value.trim(),
    notes: el('planNotes').value.trim()
  };
  if(editingPlanId){
    const p = plans.find(x => x.id === editingPlanId);
    Object.assign(p, data);
    p.exported = false;
  } else {
    plans.push(Object.assign({id: uid(), exported: false}, data));
  }
  await savePlans();
  closeSheet();
  renderPlans();
  showToast(editingPlanId ? 'Plan updated, re-export to sync the change' : 'Plan added');
}

async function deletePlan(id){
  const p = plans.find(x => x.id === id);
  const wasExported = p && p.exported;
  plans = plans.filter(x => x.id !== id);
  await savePlans();
  closeSheet();
  renderPlans();
  showToast(wasExported ? 'Removed here, delete it from your calendar too' : 'Plan removed');
}

async function markPlanDone(id){
  const p = plans.find(x => x.id === id);
  if(!p) return;
  const friend = friends.find(f => f.id === p.friendId);
  if(friend){
    friend.lastContact = p.dateTime.slice(0,10);
    friend.history = friend.history || [];
    friend.history.unshift({date: friend.lastContact, type: p.type});
    await saveFriends();
    render();
  }
  plans = plans.filter(x => x.id !== id);
  await savePlans();
  renderPlans();
  showToast('Logged, ' + (friend ? friend.name : 'plan') + ' marked done');
}

function openLog(id){
  const f = friends.find(x => x.id === id);
  if(!f) return;
  el('sheet').innerHTML = '' +
    '<h2>Log time with ' + escapeHtml(f.name) + '</h2>' +
    '<div class="field"><label>What did you do</label>' +
      '<select id="logType">' + ACTIVITY_TYPES.map(t => '<option value="' + t.id + '">' + t.label + '</option>').join('') + '</select>' +
    '</div>' +
    '<div class="sheet-actions">' +
      '<button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="confirmLog(\'' + f.id + '\')">Log it</button>' +
    '</div>';
  el('overlay').classList.add('show');
}
function confirmLog(id){
  const type = el('logType').value;
  closeSheet();
  quickLogContact(id, type);
}

function showToast(msg){
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(() => t.classList.remove('show'), 1800);
}

el('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentTier = btn.dataset.tier;
  render();
});

function openAdd(){
  editingId = null;
  el('sheet').innerHTML = sheetForm();
  el('overlay').classList.add('show');
}
function openEdit(id){
  editingId = id;
  el('sheet').innerHTML = sheetForm(friends.find(f => f.id === id));
  el('overlay').classList.add('show');
}
function closeSheet(){ el('overlay').classList.remove('show'); }

function sheetForm(f){
  const isEdit = !!f;
  f = f || {name:'', tier:'Close Friends', cadenceDays:21, birthday:'', importantDate:{label:'', date:''}, notes:''};
  const tiers = ['My Circle','Close Friends','Out of My Circle'];
  return '' +
    '<h2>' + (isEdit ? 'Edit connection' : 'Add connection') + '</h2>' +
    '<div class="field"><label>Name</label><input id="fName" value="' + escapeHtml(f.name) + '" placeholder="Friend name"></div>' +
    '<div class="row2">' +
      '<div class="field"><label>Circle</label><select id="fTier">' + tiers.map(t => '<option ' + (f.tier===t?'selected':'') + '>' + t + '</option>').join('') + '</select></div>' +
      '<div class="field"><label>See every (days)</label><input id="fCadence" type="number" value="' + (f.cadenceDays||21) + '" min="1"></div>' +
    '</div>' +
    '<div class="field"><label>Birthday</label><input id="fBirthday" type="date" value="' + (f.birthday||'') + '"></div>' +
    '<div class="row2">' +
      '<div class="field"><label>Other event label (optional)</label><input id="fEventLabel" value="' + escapeHtml((f.importantDate && f.importantDate.label) || '') + '" placeholder="Anniversary, etc."></div>' +
      '<div class="field"><label>Event date</label><input id="fEventDate" type="date" value="' + ((f.importantDate && f.importantDate.date) || '') + '"></div>' +
    '</div>' +
    '<div class="field"><label>Notes</label><textarea id="fNotes" placeholder="What they are into, last convo, etc.">' + escapeHtml(f.notes||'') + '</textarea></div>' +
    '<div class="sheet-actions">' +
      '<button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="saveFriend()">' + (isEdit ? 'Save changes' : 'Add to circle') + '</button>' +
    '</div>' +
    (isEdit ? (
      '<div class="sheet-actions"><button class="btn btn-ghost" style="flex:1" onclick="exportOne(\'' + editingId + '\')">Export birthday/events (.ics)</button></div>' +
      '<button class="danger" onclick="deleteFriend(\'' + editingId + '\')">Remove from roster</button>'
    ) : '');
}

async function saveFriend(){
  const name = el('fName').value.trim();
  if(!name){ showToast('Name needed'); return; }
  const data = {
    name,
    tier: el('fTier').value,
    cadenceDays: parseInt(el('fCadence').value) || 21,
    birthday: el('fBirthday').value || '',
    importantDate: { label: el('fEventLabel').value.trim(), date: el('fEventDate').value || '' },
    notes: el('fNotes').value.trim()
  };
  if(editingId){
    const f = friends.find(x => x.id === editingId);
    Object.assign(f, data);
  } else {
    friends.push(Object.assign({id: uid(), lastContact:'', history:[]}, data));
  }
  await saveFriends();
  closeSheet();
  render();
  showToast(editingId ? 'Updated' : 'Added to your circle');
}

async function deleteFriend(id){
  friends = friends.filter(f => f.id !== id);
  await saveFriends();
  closeSheet();
  render();
  showToast('Removed');
}

function pad2(n){ return String(n).padStart(2,'0'); }
function icsEscape(s){ return (s||'').replace(/[\\;,]/g, m => '\\'+m); }

function buildIcsTimedEvent(plan){
  const start = new Date(plan.dateTime);
  const end = new Date(start.getTime() + (plan.duration || 60) * 60000);
  const fmt = d => d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate()) + 'T' + pad2(d.getHours()) + pad2(d.getMinutes()) + '00';
  const typeLabel = (ACTIVITY_TYPES.find(t => t.id === plan.type) || {label:'Hangout'}).label;
  const summary = typeLabel + ' with ' + plan.friendName;
  const lines = [
    'BEGIN:VEVENT',
    'UID:' + plan.id + '@connectionsapp',
    'DTSTART:' + fmt(start),
    'DTEND:' + fmt(end),
    'SUMMARY:' + icsEscape(summary)
  ];
  if(plan.location) lines.push('LOCATION:' + icsEscape(plan.location));
  if(plan.notes) lines.push('DESCRIPTION:' + icsEscape(plan.notes));
  lines.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:Reminder','TRIGGER:-PT30M','END:VALARM');
  lines.push('END:VEVENT');
  return lines.join('\r\n');
}

function exportOnePlan(id){
  const p = plans.find(x => x.id === id);
  if(!p) return;
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Connections//EN', buildIcsTimedEvent(p), 'END:VCALENDAR'].join('\r\n');
  downloadIcs(ics, p.friendName.replace(/\s+/g,'_') + '_plan.ics');
  p.exported = true;
  savePlans();
  renderPlans();
  showToast('Downloaded, import into your calendar app');
}

function exportAllPlans(forceAll){
  const toExport = forceAll ? plans : plans.filter(p => !p.exported);
  if(!toExport.length){
    if(plans.length){
      showToast('Nothing new, everyone already sent');
    } else {
      showToast('No plans yet');
    }
    return;
  }
  const events = toExport.map(p => buildIcsTimedEvent(p));
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Connections//EN'].concat(events).concat(['END:VCALENDAR']).join('\r\n');
  downloadIcs(ics, 'connections_plans.ics');
  toExport.forEach(p => { p.exported = true; });
  savePlans();
  renderPlans();
  showToast('Downloaded ' + toExport.length + ' plan' + (toExport.length===1?'':'s') + ', import into your calendar app');
}

function buildIcsEvent(name, label, dateStr){
  if(!dateStr) return '';
  const bits = dateStr.split('-');
  const dt = bits[0] + bits[1] + bits[2];
  const uidStr = dt + '-' + name.replace(/\s+/g,'') + '-' + label.replace(/\s+/g,'') + '@connectionsapp';
  return [
    'BEGIN:VEVENT',
    'UID:' + uidStr,
    'DTSTART;VALUE=DATE:' + dt,
    'RRULE:FREQ=YEARLY',
    'SUMMARY:' + icsEscape(label + ' - ' + name),
    'BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:Reminder','TRIGGER:-P1D','END:VALARM',
    'END:VEVENT'
  ].join('\r\n');
}

function downloadIcs(content, filename){
  const blob = new Blob([content], {type:'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportOne(id){
  const f = friends.find(x => x.id === id);
  if(!f) return;
  let events = [];
  if(f.birthday) events.push(buildIcsEvent(f.name, 'Birthday', f.birthday));
  if(f.importantDate && f.importantDate.date) events.push(buildIcsEvent(f.name, f.importantDate.label || 'Event', f.importantDate.date));
  if(!events.length){ showToast('No dates set for ' + f.name); return; }
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Connections//EN'].concat(events).concat(['END:VCALENDAR']).join('\r\n');
  downloadIcs(ics, f.name.replace(/\s+/g,'_') + '_dates.ics');
  showToast('Downloaded, import into your calendar app');
}

function exportAll(){
  let events = [];
  friends.forEach(f => {
    if(f.birthday) events.push(buildIcsEvent(f.name, 'Birthday', f.birthday));
    if(f.importantDate && f.importantDate.date) events.push(buildIcsEvent(f.name, f.importantDate.label || 'Event', f.importantDate.date));
  });
  if(!events.length){ showToast('No birthdays or events set yet'); return; }
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Connections//EN'].concat(events).concat(['END:VCALENDAR']).join('\r\n');
  downloadIcs(ics, 'connections_dates.ics');
  showToast('Downloaded all dates, import into your calendar app');
}

el('addBtn').addEventListener('click', openAdd);
el('overlay').addEventListener('click', e => { if(e.target.id === 'overlay') closeSheet(); });

loadFriends();
loadPlans();
</script>
